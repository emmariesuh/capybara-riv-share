<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capybara Rive Animation</title>
<style>
  html, body { margin: 0; height: 100%; background: #f4ede4; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  canvas { width: 90vmin; height: 90vmin; max-width: 600px; max-height: 600px; }
  p { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #6b4f3a; font-size: 20px; }
</style>
</head>
<body>
<canvas id="canvas" width="600" height="600"></canvas>
<p>Riv experiement 1</p>
<script src="https://unpkg.com/@rive-app/canvas@2.7.0"></script>
<script>
  new rive.Rive({
    src: "capybara_orange.riv",
    canvas: document.getElementById("canvas"),
    autoplay: true,
    fit: rive.Fit.contain,
    onLoad: () => {},
  });
</script>
</body>
</html>
